<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Deutsch Lernen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THEME VARIABLES
============================================================ */
:root {
  --radius: 14px;
  --accent:  #e8c547;
  --accent2: #7b6ef6;
  --accent3: #4ecdc4;
  --red:     #ff6b6b;
  --green:   #51cf66;
  --trans: all 0.25s ease;
}

[data-theme="dark"] {
  --bg:        #08080e;
  --surface:   #111119;
  --surface2:  #181824;
  --surface3:  #20202e;
  --border:    #27273a;
  --text:      #eeeef8;
  --text-muted:#7777aa;
  --header-bg: rgba(8,8,14,0.85);
  --shadow:    0 4px 24px rgba(0,0,0,0.4);
  --glow1: rgba(123,110,246,0.13);
  --glow2: rgba(232,197,71,0.07);
  --glow3: rgba(78,205,196,0.05);
}

[data-theme="light"] {
  --bg:        #f4f4fb;
  --surface:   #ffffff;
  --surface2:  #f0f0fa;
  --surface3:  #e8e8f5;
  --border:    #dcdcf0;
  --text:      #18182a;
  --text-muted:#7070a0;
  --header-bg: rgba(244,244,251,0.88);
  --shadow:    0 4px 24px rgba(100,100,180,0.10);
  --glow1: rgba(123,110,246,0.06);
  --glow2: rgba(232,197,71,0.05);
  --glow3: rgba(78,205,196,0.04);
}

/* ============================================================
   RESET & BASE
============================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  transition:background .35s,color .35s;
}

body::before {
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 55% 40% at 15% 10%, var(--glow1) 0%, transparent 60%),
    radial-gradient(ellipse 45% 50% at 85% 85%, var(--glow2) 0%, transparent 60%),
    radial-gradient(ellipse 40% 55% at 55% 45%, var(--glow3) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}

/* ============================================================
   SCREEN SYSTEM
============================================================ */
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:flex;flex-direction:column;min-height:100vh;}

/* ============================================================
   WELCOME
============================================================ */
#welcome{
  align-items:center;justify-content:center;
  padding:2rem 1rem;text-align:center;gap:0;
}

.welcome-theme-btn{
  position:fixed;top:1rem;right:1rem;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);border-radius:50px;padding:.45rem .9rem;
  font-size:.85rem;cursor:pointer;transition:var(--trans);
  font-family:'DM Sans',sans-serif;z-index:200;
  display:flex;align-items:center;gap:.4rem;
}
.welcome-theme-btn:hover{border-color:var(--accent2);color:var(--accent2);}

.logo-area{margin-bottom:2.5rem;animation:fadeUp .7s ease both;}
.logo-flag{font-size:3.2rem;display:block;margin-bottom:.8rem;animation:float 3s ease-in-out infinite;}

@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

.logo-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.2rem,7vw,4.5rem);
  font-weight:900;line-height:1.05;letter-spacing:-.02em;
}
.logo-title .de{color:var(--accent);}
.logo-title .lrn{color:var(--accent2);}
.logo-sub{
  font-size:.85rem;color:var(--text-muted);margin-top:.6rem;
  font-family:'Space Mono',monospace;letter-spacing:.1em;text-transform:uppercase;
}

.lang-selector-title{
  font-size:.78rem;text-transform:uppercase;letter-spacing:.15em;
  color:var(--text-muted);margin-bottom:1rem;
  animation:fadeUp .7s .15s ease both;font-family:'Space Mono',monospace;
}
.lang-cards{
  display:flex;gap:1rem;margin-bottom:2.5rem;
  flex-wrap:wrap;justify-content:center;
  animation:fadeUp .7s .25s ease both;
}
.lang-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--radius);padding:1.25rem 1.75rem;
  cursor:pointer;transition:var(--trans);min-width:140px;
  position:relative;overflow:hidden;
}
.lang-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent2),var(--accent3));
  opacity:0;transition:opacity .3s;
}
.lang-card:hover::before,.lang-card.selected::before{opacity:.1;}
.lang-card.selected{border-color:var(--accent2);}
.lang-card .flag{font-size:2.2rem;display:block;margin-bottom:.4rem;}
.lang-card .lang-name{font-weight:600;font-size:.95rem;position:relative;}
.lang-card .lang-hint{font-size:.75rem;color:var(--text-muted);margin-top:.2rem;position:relative;}

.start-btn{
  background:linear-gradient(135deg,var(--accent),#f0a500);
  color:#000;border:none;border-radius:50px;
  padding:.9rem 2.5rem;font-size:1rem;font-weight:700;
  cursor:pointer;transition:var(--trans);
  font-family:'DM Sans',sans-serif;letter-spacing:.02em;
  box-shadow:0 8px 28px rgba(232,197,71,.28);
  animation:fadeUp .7s .35s ease both;
}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(232,197,71,.38);}
.start-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

.wc-info{
  margin-top:1.5rem;color:var(--text-muted);font-size:.8rem;
  animation:fadeUp .7s .45s ease both;
}

/* ============================================================
   APP HEADER
============================================================ */
#app{flex-direction:column;}

.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem 1.5rem;
  border-bottom:1px solid var(--border);
  background:var(--header-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;
  gap:.75rem;flex-wrap:wrap;
}

.header-logo{
  font-family:'Playfair Display',serif;font-weight:700;font-size:1.2rem;
  white-space:nowrap;
}
.header-logo span{color:var(--accent);}

.progress-area{
  display:flex;align-items:center;gap:.75rem;flex:1;
  max-width:380px;min-width:0;
}
.progress-bar{flex:1;height:5px;background:var(--border);border-radius:100px;overflow:hidden;min-width:60px;}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent2),var(--accent3));
  border-radius:100px;transition:width .5s ease;width:0%;
}
.progress-text{
  font-family:'Space Mono',monospace;font-size:.75rem;
  color:var(--text-muted);white-space:nowrap;
}

.header-actions{display:flex;gap:.5rem;align-items:center;flex-shrink:0;}

.hbtn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:10px;padding:.45rem .9rem;
  font-size:.82rem;cursor:pointer;transition:var(--trans);
  font-family:'DM Sans',sans-serif;white-space:nowrap;
  display:flex;align-items:center;gap:.35rem;
}
.hbtn:hover{border-color:var(--accent2);color:var(--accent2);}
.hbtn.theme-btn{padding:.45rem .7rem;}

/* ============================================================
   MODE NAV
============================================================ */
.mode-nav{
  display:flex;gap:.4rem;padding:.75rem 1.25rem;
  overflow-x:auto;border-bottom:1px solid var(--border);
  scrollbar-width:none;background:var(--bg);position:sticky;top:57px;z-index:90;
}
.mode-nav::-webkit-scrollbar{display:none;}

.mode-tab{
  display:flex;align-items:center;gap:.4rem;
  padding:.5rem 1rem;border-radius:50px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-muted);cursor:pointer;font-size:.82rem;font-weight:500;
  white-space:nowrap;transition:var(--trans);font-family:'DM Sans',sans-serif;
  flex-shrink:0;
}
.mode-tab.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.mode-tab:hover:not(.active){border-color:var(--text-muted);color:var(--text);}
.mode-icon{font-size:.95rem;}

/* ============================================================
   CONTENT
============================================================ */
.content{flex:1;padding:1.5rem;max-width:960px;margin:0 auto;width:100%;}

/* ============================================================
   CATEGORY BAR
============================================================ */
.category-bar{
  display:flex;gap:.4rem;margin-bottom:1.25rem;
  flex-wrap:wrap;
}
.cat-btn{
  padding:.35rem .9rem;border-radius:50px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-muted);font-size:.78rem;
  cursor:pointer;transition:var(--trans);font-family:'DM Sans',sans-serif;
}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.cat-btn:hover:not(.active){border-color:var(--text-muted);color:var(--text);}

/* ============================================================
   MODE 1 — VOCAB GRID
============================================================ */
.vocab-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:.85rem;
}

.vocab-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.25rem;
  cursor:pointer;transition:var(--trans);
  position:relative;overflow:hidden;
}
.vocab-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent2),var(--accent3));
  transform:scaleX(0);transform-origin:left;transition:transform .3s ease;
}
.vocab-card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:var(--shadow);}
.vocab-card:hover::after{transform:scaleX(1);}

.vc-article{
  font-family:'Space Mono',monospace;font-size:.68rem;
  color:var(--accent);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:.4rem;
}
.vc-german{
  font-family:'Playfair Display',serif;font-size:1.45rem;
  font-weight:700;margin-bottom:.2rem;
}
.vc-translation{font-size:.92rem;color:var(--text-muted);margin-bottom:.6rem;}
.vc-category{
  display:inline-block;background:rgba(123,110,246,.12);
  border:1px solid rgba(123,110,246,.25);color:var(--accent2);
  font-size:.7rem;padding:.18rem .55rem;border-radius:50px;
}
.vc-example{
  margin-top:.65rem;padding-top:.65rem;border-top:1px solid var(--border);
  font-size:.78rem;color:var(--text-muted);font-style:italic;display:none;
}
.vocab-card.expanded .vc-example{display:block;}
.expand-hint{
  font-size:.7rem;color:var(--text-muted);margin-top:.5rem;
  font-family:'Space Mono',monospace;opacity:.6;
}

/* ============================================================
   SHARED QUIZ STYLES
============================================================ */
.quiz-wrap{max-width:640px;margin:0 auto;}

.quiz-topbar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem;
}
.quiz-counter{font-family:'Space Mono',monospace;font-size:.82rem;color:var(--text-muted);}
.score-badge{
  background:rgba(81,207,102,.1);border:1px solid rgba(81,207,102,.3);
  color:var(--green);font-size:.82rem;padding:.28rem .75rem;
  border-radius:50px;font-family:'Space Mono',monospace;
}

.quiz-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:2rem 1.75rem;margin-bottom:1.25rem;
  box-shadow:var(--shadow);
}

/* ============================================================
   MODE 2 — FILL
============================================================ */
.fill-sentence{
  font-size:1.25rem;line-height:1.9;margin-bottom:1.5rem;
  font-family:'Playfair Display',serif;text-align:center;
}
.fill-blank{
  display:inline-block;min-width:80px;
  border-bottom:3px solid var(--accent);
  padding:0 .4rem;vertical-align:bottom;
  font-weight:700;color:var(--accent);
  font-family:'Space Mono',monospace;font-size:1rem;text-align:center;
}
.fill-options{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;}
.fill-option{
  background:var(--surface2);border:2px solid var(--border);
  border-radius:10px;padding:.85rem;font-size:.95rem;font-weight:500;
  cursor:pointer;transition:var(--trans);text-align:center;
  font-family:'DM Sans',sans-serif;color:var(--text);
}
.fill-option:hover:not(:disabled){border-color:var(--accent2);color:var(--accent2);transform:translateY(-1px);}
.fill-option.correct{border-color:var(--green);background:rgba(81,207,102,.1);color:var(--green);}
.fill-option.wrong{border-color:var(--red);background:rgba(255,107,107,.1);color:var(--red);}

.feedback-box{
  margin-top:1.25rem;padding:.9rem 1.1rem;border-radius:10px;
  font-size:.88rem;display:none;
}
.feedback-box.show{display:block;animation:fadeUp .3s ease;}
.feedback-box.correct{background:rgba(81,207,102,.08);border:1px solid rgba(81,207,102,.3);color:var(--green);}
.feedback-box.wrong{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.3);color:var(--red);}

.next-btn{
  width:100%;padding:.9rem;border-radius:12px;
  background:linear-gradient(135deg,var(--accent2),var(--accent3));
  color:#fff;border:none;font-size:.95rem;font-weight:600;
  cursor:pointer;transition:var(--trans);
  font-family:'DM Sans',sans-serif;margin-top:.75rem;display:none;
}
.next-btn.show{display:block;}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(123,110,246,.3);}

/* ============================================================
   MODE 3 — MATCH
============================================================ */
.match-wrap{max-width:680px;margin:0 auto;}
.match-instructions{text-align:center;color:var(--text-muted);margin-bottom:1.5rem;font-size:.88rem;}
.match-columns{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.25rem;}
.match-col-title{
  font-family:'Space Mono',monospace;font-size:.68rem;
  text-transform:uppercase;letter-spacing:.15em;color:var(--text-muted);
  margin-bottom:.65rem;text-align:center;
}
.match-item{
  background:var(--surface);border:2px solid var(--border);
  border-radius:10px;padding:.8rem 1rem;margin-bottom:.5rem;
  cursor:pointer;transition:var(--trans);text-align:center;
  font-weight:500;font-size:.9rem;
}
.match-item:hover:not(.matched){border-color:var(--accent2);color:var(--accent2);}
.match-item.selected{border-color:var(--accent);color:var(--accent);background:rgba(232,197,71,.07);}
.match-item.matched{border-color:var(--green);color:var(--green);background:rgba(81,207,102,.07);cursor:default;opacity:.65;}
.match-item.wrong-flash{border-color:var(--red);background:rgba(255,107,107,.08);animation:shake .3s ease;}

@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

.match-score-display{text-align:center;font-family:'Space Mono',monospace;font-size:.85rem;color:var(--text-muted);margin-bottom:.75rem;}
.reload-btn{
  display:block;margin:.5rem auto;padding:.6rem 1.75rem;
  border-radius:50px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:var(--trans);
}
.reload-btn:hover{border-color:var(--accent3);color:var(--accent3);}

/* ============================================================
   MODE 4 — TRANSLATE
============================================================ */
.translate-wrap{max-width:640px;margin:0 auto;}
.prompt-label{
  font-family:'Space Mono',monospace;font-size:.68rem;
  text-transform:uppercase;letter-spacing:.15em;color:var(--accent3);margin-bottom:.65rem;
}
.prompt-text{
  font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;
  margin-bottom:.4rem;
}
.prompt-hint{font-size:.82rem;color:var(--text-muted);margin-bottom:1.5rem;font-style:italic;}

.translate-input{
  width:100%;background:var(--surface2);border:2px solid var(--border);
  border-radius:10px;padding:.85rem 1rem;font-size:1rem;color:var(--text);
  font-family:'DM Sans',sans-serif;transition:var(--trans);resize:none;
}
.translate-input:focus{outline:none;border-color:var(--accent2);}
[data-theme="light"] .translate-input{background:var(--surface3);}

.translate-actions{display:flex;gap:.65rem;margin-top:.75rem;flex-wrap:wrap;}
.check-btn{
  flex:1;min-width:120px;padding:.85rem;border-radius:10px;
  background:linear-gradient(135deg,var(--accent2),var(--accent3));
  color:#fff;border:none;font-size:.9rem;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:var(--trans);
}
.check-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(123,110,246,.3);}
.reveal-btn{
  padding:.85rem 1.25rem;border-radius:10px;background:var(--surface2);
  border:1px solid var(--border);color:var(--text-muted);font-size:.9rem;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:var(--trans);white-space:nowrap;
}
.reveal-btn:hover{border-color:var(--accent);color:var(--accent);}

.answer-box{
  margin-top:1.25rem;padding:1.1rem;border-radius:10px;
  background:rgba(78,205,196,.07);border:1px solid rgba(78,205,196,.22);display:none;
}
.answer-box.show{display:block;animation:fadeUp .3s ease;}
.answer-label{font-family:'Space Mono',monospace;font-size:.67rem;text-transform:uppercase;letter-spacing:.15em;color:var(--accent3);margin-bottom:.4rem;}
.answer-text{font-size:1.05rem;font-weight:600;margin-bottom:.4rem;}
.answer-expl{font-size:.82rem;color:var(--text-muted);}

.tnav{display:flex;gap:.65rem;justify-content:center;margin-top:.75rem;}
.tnav-btn{
  padding:.55rem 1.4rem;border-radius:50px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-muted);cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:var(--trans);
}
.tnav-btn:hover{border-color:var(--accent2);color:var(--accent2);}

/* ============================================================
   MODE 5 — GRAMMAR
============================================================ */
.grammar-wrap{max-width:820px;margin:0 auto;}
.grammar-section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.5rem;margin-bottom:1.25rem;
  box-shadow:var(--shadow);
}
.gs-title{
  font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;
  margin-bottom:.35rem;color:var(--accent);
}
.gs-sub{font-size:.82rem;color:var(--text-muted);margin-bottom:1.1rem;}

.art-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin-bottom:1.25rem;}
.art-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.9rem;text-align:center;}
.art-card .art{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;margin-bottom:.2rem;}
.art-card .art-type{font-size:.7rem;color:var(--text-muted);font-family:'Space Mono',monospace;}
.art-card.der .art{color:#4ecdc4;}
.art-card.die .art{color:#ff9ff3;}
.art-card.das .art{color:#ffd93d;}

.g-table{width:100%;border-collapse:collapse;font-size:.88rem;}
.g-table th{
  background:var(--surface2);padding:.6rem .9rem;text-align:left;
  font-family:'Space Mono',monospace;font-size:.7rem;text-transform:uppercase;
  letter-spacing:.1em;color:var(--text-muted);border-bottom:1px solid var(--border);
}
.g-table td{padding:.6rem .9rem;border-bottom:1px solid rgba(42,42,64,.4);vertical-align:middle;}
[data-theme="light"] .g-table td{border-bottom-color:rgba(200,200,230,.5);}
.g-table tr:last-child td{border-bottom:none;}
.g-table tr:hover td{background:rgba(123,110,246,.04);}
.g-table .de-cell{font-family:'Playfair Display',serif;font-size:.98rem;font-weight:700;}
.a-der{color:#4ecdc4;}.a-die{color:#ff9ff3;}.a-das{color:#ffd93d;}

.conj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
.conj-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1rem;}
.conj-verb{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--accent);margin-bottom:.15rem;}
.conj-meaning{font-size:.75rem;color:var(--text-muted);margin-bottom:.75rem;}
.conj-row{display:flex;justify-content:space-between;padding:.3rem 0;border-bottom:1px solid var(--border);font-size:.85rem;}
.conj-row:last-child{border-bottom:none;}
.conj-pro{color:var(--accent2);}
.conj-form{font-weight:600;}

/* ============================================================
   MODE 6 — REVIEW/QUIZ
============================================================ */
.review-wrap{max-width:580px;margin:0 auto;}
.review-badge{
  display:inline-block;background:rgba(232,197,71,.1);
  border:1px solid rgba(232,197,71,.3);color:var(--accent);
  font-size:.72rem;padding:.28rem .75rem;border-radius:50px;
  font-family:'Space Mono',monospace;letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:1.25rem;
}
.review-question{
  font-family:'Playfair Display',serif;font-size:1.9rem;
  font-weight:900;margin-bottom:.4rem;letter-spacing:-.02em;
}
.review-sub{font-size:.88rem;color:var(--text-muted);margin-bottom:1.75rem;}
.review-options{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;}
.review-option{
  background:var(--surface2);border:2px solid var(--border);
  border-radius:10px;padding:.9rem;font-size:.92rem;font-weight:500;
  cursor:pointer;transition:var(--trans);text-align:center;
  font-family:'DM Sans',sans-serif;color:var(--text);
}
.review-option:hover:not(:disabled){border-color:var(--accent2);color:var(--accent2);}
.review-option.correct{border-color:var(--green);background:rgba(81,207,102,.1);color:var(--green);}
.review-option.wrong{border-color:var(--red);background:rgba(255,107,107,.1);color:var(--red);}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin-bottom:1.75rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-family:'Space Mono',monospace;font-size:1.7rem;font-weight:700;}
.stat-label{font-size:.75rem;color:var(--text-muted);margin-top:.2rem;}
.stat-card.sc .stat-num{color:var(--green);}
.stat-card.sw .stat-num{color:var(--red);}
.stat-card.st .stat-num{color:var(--accent);}

/* ============================================================
   EMPTY / UTILITY
============================================================ */
.empty{text-align:center;padding:3.5rem 2rem;color:var(--text-muted);}
.empty .icon{font-size:2.5rem;margin-bottom:.75rem;}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp .35s ease;}

/* ============================================================
   CELEBRATE
============================================================ */
.celebrate-wrap{position:fixed;inset:0;pointer-events:none;z-index:9998;}
.cdot{
  position:absolute;width:7px;height:7px;border-radius:50%;
  animation:cfetti .9s ease-out forwards;
}
@keyframes cfetti{
  0%{transform:translate(0,0) rotate(0deg);opacity:1;}
  100%{transform:translate(var(--tx),var(--ty)) rotate(360deg);opacity:0;}
}

/* ============================================================
   RESPONSIVE
============================================================ */
@media(max-width:768px){
  .content{padding:1rem;}
  .app-header{padding:.75rem 1rem;top:0;}
  .progress-area{display:none;}
  .header-logo{font-size:1rem;}
  .mode-nav{padding:.6rem .85rem;top:50px;}
  .vocab-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
  .match-columns{grid-template-columns:1fr;gap:.85rem;}
  .fill-options{grid-template-columns:1fr;}
  .review-options{grid-template-columns:1fr;}
  .conj-grid{grid-template-columns:1fr;}
  .translate-actions{flex-direction:column;}
  .review-question{font-size:1.5rem;}
  .quiz-card{padding:1.5rem 1.25rem;}
  .art-grid{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:480px){
  .vocab-grid{grid-template-columns:1fr 1fr;}
  .stats-grid{grid-template-columns:repeat(3,1fr);}
  .lang-cards{gap:.65rem;}
  .lang-card{min-width:120px;padding:1rem 1.25rem;}
  .logo-title{font-size:clamp(2rem,10vw,3rem);}
  .hbtn span.btn-label{display:none;}
  .fill-sentence{font-size:1.1rem;}
}

@media(max-width:360px){
  .vocab-grid{grid-template-columns:1fr;}
  .mode-tab .mode-label{display:none;}
}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>

/* ============================================================
   MODE 1 — VOCAB
============================================================ */
function renderVocab(){
  const mc=document.getElementById('mainContent');
  const cats=['all',...new Set(VOCAB.map(v=>v.cat))];
  let html=`<div class="category-bar">`;
  cats.forEach(c=>{html+=`<button class="cat-btn ${currentCat===c?'active':''}" onclick="setCat('${c}')">${t(c)}</button>`;});
  html+=`</div><div class="vocab-grid" id="vocabGrid">`;
  const filtered=currentCat==='all'?VOCAB:VOCAB.filter(v=>v.cat===currentCat);
  if(!filtered.length){html+=`<div class="empty"><div class="icon">🔍</div><p>${t('noResult')}</p></div>`;}
  else{
    filtered.forEach((w,i)=>{
      const artC=w.article==='der'?'a-der':w.article==='die'?'a-die':w.article==='das'?'a-das':'';
      seenWords.add(VOCAB.indexOf(w));
      const ex=exT(w);const exde=w.ex_de;
      html+=`<div class="vocab-card" onclick="this.classList.toggle('expanded')">
        ${w.article?`<div class="vc-article ${artC}">${w.article}</div>`:''}
        <div class="vc-german">${w.de}</div>
        <div class="vc-translation">${wt(w)}</div>
        <span class="vc-category">${t(w.cat)}</span>
        ${exde?`<div class="vc-example"><strong>🇩🇪</strong> <em>${exde}</em><br><small style="color:var(--text-muted)">${ex}</small></div><div class="expand-hint">↕ ${t('clickExpand')}</div>`:''}
      </div>`;
    });
  }
  html+=`</div>`;
  mc.innerHTML=html;
  updateProgress();
}

function setCat(cat){currentCat=cat;renderVocab();}

============================================================ */
function renderFill(){
  const mc=document.getElementById('mainContent');
  if(fillIndex>=FILL_EXERCISES.length)fillIndex=0;
  fillAnswered=false;
  const ex=FILL_EXERCISES[fillIndex];
  const sentence=currentLang==='fr'?ex.sf:ex.sm;
  const expl=currentLang==='fr'?ex.ef:ex.em;
  let opts=[...ex.options].sort(()=>Math.random()-.5);
  mc.innerHTML=`
    <div class="quiz-wrap">
      <div class="quiz-topbar">
        <div class="quiz-counter">${t('question')} ${fillIndex+1} ${t('of')} ${FILL_EXERCISES.length}</div>
        <div class="score-badge">✓ ${fillScore} / ${fillTotal}</div>
      </div>
      <div class="quiz-card">
        <div class="fill-sentence">${sentence.replace('___','<span class="fill-blank" id="fillBlank">___</span>')}</div>
        <div class="fill-options" id="fillOpts">
          ${opts.map(o=>`<button class="fill-option" onclick="checkFill('${o}','${ex.blank}','${expl.replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}
        </div>
        <div class="feedback-box" id="fillFeedback"></div>
      </div>
      <button class="next-btn" id="fillNext" onclick="nextFill()">${t('next')}</button>
    </div>`;
}

function checkFill(chosen,correct,expl,btn){
  if(fillAnswered)return;
  fillAnswered=true;fillTotal++;
  const ok=chosen===correct;
  if(ok)fillScore++;
  document.querySelectorAll('.fill-option').forEach(b=>{
    b.disabled=true;
    if(b.textContent.trim()===correct)b.classList.add('correct');
    else if(b===btn&&!ok)b.classList.add('wrong');
  });
  const fb=document.getElementById('fillFeedback');
  document.getElementById('fillBlank').textContent=correct;
  document.getElementById('fillBlank').style.color=ok?'var(--green)':'var(--red)';
  fb.className=`feedback-box show ${ok?'correct':'wrong'}`;
  fb.innerHTML=ok?`✓ ${t('correct')}! ${expl}`:`✗ ${t('wrong')}. ${t('explanation')}: ${expl}`;
  document.getElementById('fillNext').classList.add('show');
  if(ok)celebrate();
}

function nextFill(){fillIndex=(fillIndex+1)%FILL_EXERCISES.length;renderFill();}

  matchSelected=null;matchMatched=new Set();
  const pool=[...VOCAB].sort(()=>Math.random()-.5).slice(0,7);
  matchPairs=pool.map(w=>({de:w.de,tr:wt(w)}));
  let left=[...matchPairs].map(p=>p.de).sort(()=>Math.random()-.5);
  let right=[...matchPairs].map(p=>p.tr).sort(()=>Math.random()-.5);
  mc.innerHTML=`
    <div class="match-wrap">
      <p class="match-instructions">${t('matchInstr')}</p>
      <div class="match-score-display" id="matchScore">0 / ${matchPairs.length}</div>
      <div class="match-columns">
        <div>
          <div class="match-col-title">🇩🇪 ${t('german')}</div>
          ${left.map(w=>`<div class="match-item" data-side="left" data-val="${w.replace(/"/g,'&quot;')}" onclick="selectMatch(this)">${w}</div>`).join('')}
        </div>
        <div>
          <div class="match-col-title">🌐 ${t('translation')}</div>
          ${right.map(w=>`<div class="match-item" data-side="right" data-val="${w.replace(/"/g,'&quot;')}" onclick="selectMatch(this)">${w}</div>`).join('')}
        </div>
      </div>
      <button class="reload-btn" onclick="renderMatch()">↻ ${t('resetMatch')}</button>
    </div>`;
}

function selectMatch(el){
  if(el.classList.contains('matched'))return;
  if(!matchSelected){
    document.querySelectorAll('.match-item.selected').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected');matchSelected=el;return;
  }
  if(matchSelected.dataset.side===el.dataset.side){
    matchSelected.classList.remove('selected');el.classList.add('selected');matchSelected=el;return;
  }
  const lv=matchSelected.dataset.side==='left'?matchSelected.dataset.val:el.dataset.val;
  const rv=matchSelected.dataset.side==='right'?matchSelected.dataset.val:el.dataset.val;
  const pair=matchPairs.find(p=>p.de===lv&&p.tr===rv);
  if(pair){
    [matchSelected,el].forEach(e=>{e.classList.remove('selected');e.classList.add('matched');});
    matchMatched.add(lv);celebrate();
    const done=matchMatched.size;
    document.getElementById('matchScore').textContent=done+' / '+matchPairs.length;
    if(done===matchPairs.length)setTimeout(()=>{document.getElementById('matchScore').innerHTML=`<span style="color:var(--green)">${t('matchDone')}</span>`;},300);
  }else{
    [matchSelected,el].forEach(e=>{e.classList.remove('selected');e.classList.add('wrong-flash');setTimeout(()=>e.classList.remove('wrong-flash'),400);});
  }
  matchSelected=null;
}

/* ============================================================
   MODE 4 — TRANSLATE
============================================================ */
function renderTranslate(){
  const mc=document.getElementById('mainContent');
  if(translateIdx>=VOCAB.length)translateIdx=0;
  const w=VOCAB[translateIdx];
  const dir=translateIdx%2===0?'de2tr':'tr2de';
  let prompt,promptLabel,answer;
  if(dir==='de2tr'){
    prompt=(w.article?w.article+' ':'')+w.de;
    promptLabel='🇩🇪 → '+(currentLang==='fr'?'🇫🇷 Français':'🇲🇬 Malagasy');
    answer=wt(w);
  }else{
    prompt=wt(w);
    promptLabel=(currentLang==='fr'?'🇫🇷 Français':'🇲🇬 Malagasy')+' → 🇩🇪';
    answer=(w.article?w.article+' ':'')+w.de;
  }
  const ex=exT(w);const exde=w.ex_de;
  mc.innerHTML=`
    <div class="translate-wrap">
      <div class="quiz-topbar">
        <div class="quiz-counter">${translateIdx+1} / ${VOCAB.length}</div>
        <div class="score-badge">🏷 ${t(w.cat)}</div>
      </div>
      <div class="quiz-card">
        <div class="prompt-label">${promptLabel}</div>
        <div class="prompt-text">${prompt}</div>
        ${exde?`<div class="prompt-hint">🇩🇪 ${exde}</div>`:''}
        <textarea class="translate-input" id="tInput" placeholder="${t('typeHere')}" rows="2"></textarea>
        <div class="translate-actions">
          <button class="check-btn" onclick="checkTranslate()">✓ ${t('check')}</button>
          <button class="reveal-btn" onclick="revealTranslate()">👁 ${t('reveal')}</button>
        </div>
        <div class="answer-box" id="answerBox"></div>
      </div>
      <div class="tnav">
        <button class="tnav-btn" onclick="navT(-1)">← ${t('prev')}</button>
        <button class="tnav-btn" onclick="navT(1)">${t('nextCard')} →</button>
      </div>
    </div>`;
  mc.dataset.tAnswer=answer;
  mc.dataset.tDe=w.de;
  mc.dataset.tTr=wt(w);
  mc.dataset.tEx=ex||'';
  mc.dataset.tExDe=exde||'';
}

function checkTranslate(){
  const mc=document.getElementById('mainContent');
  const input=document.getElementById('tInput').value.trim().toLowerCase();
  const ans=mc.dataset.tAnswer.toLowerCase();
  const de=mc.dataset.tDe.toLowerCase();
  const tr=mc.dataset.tTr.toLowerCase();
  const ok=input===ans||input===de||input===tr||(ans.includes(input)&&input.length>2);
  showAnswer(mc.dataset.tAnswer,mc.dataset.tEx,mc.dataset.tExDe,ok);
}

function revealTranslate(){
  const mc=document.getElementById('mainContent');
  showAnswer(mc.dataset.tAnswer,mc.dataset.tEx,mc.dataset.tExDe,false);
}

function showAnswer(answer,ex,exde,ok){
  const box=document.getElementById('answerBox');
  box.className='answer-box show';
  box.innerHTML=`
    <div class="answer-label">✓ ${t('explanation')}</div>
    <div class="answer-text">${answer}</div>
    ${exde?`<div class="answer-expl">🇩🇪 <em>${exde}</em></div>`:''}
    ${ex?`<div class="answer-expl">${ex}</div>`:''}`;
  if(ok)celebrate();
}

function navT(dir){translateIdx=(translateIdx+dir+VOCAB.length)%VOCAB.length;renderTranslate();}

/* ============================================================
   MODE 5 — GRAMMAR
============================================================ */
function renderGrammar(){
  const mc=document.getElementById('mainContent');
  const artEx={
    der:VOCAB.filter(v=>v.article==='der').slice(0,5),
    die:VOCAB.filter(v=>v.article==='die').slice(0,5),
    das:VOCAB.filter(v=>v.article==='das').slice(0,5),
  };
  let html=`<div class="grammar-wrap">`;

  // Articles
  html+=`<div class="grammar-section">
    <div class="gs-title">📌 ${t('articleTitle')}</div>
    <div class="gs-sub">${t('articleSub')}</div>
    <div class="art-grid">
      <div class="art-card der"><div class="art">der</div><div class="art-type">Masculin</div></div>
      <div class="art-card die"><div class="art">die</div><div class="art-type">Féminin / Pluriel</div></div>
      <div class="art-card das"><div class="art">das</div><div class="art-type">Neutre</div></div>
    </div>
    <div class="gs-title" style="font-size:.95rem;margin-bottom:.85rem">📚 ${t('articlesWords')}</div>
    <table class="g-table"><thead><tr><th>Article</th><th>Mot</th><th>${currentLang==='fr'?'Français':'Malagasy'}</th></tr></thead><tbody>`;
  ['der','die','das'].forEach(art=>{
    artEx[art].forEach((w,i)=>{
      const ac=`a-${art}`;
      html+=`<tr>${i===0?`<td class="de-cell ${ac}" rowspan="${artEx[art].length}">${art}</td>`:''}
        <td class="de-cell">${w.de}</td><td>${wt(w)}</td></tr>`;
    });
  });
  html+=`</tbody></table></div>`;

  // Conjugation
  html+=`<div class="grammar-section">
    <div class="gs-title">⚙️ ${t('conjTitle')}</div>
    <div class="gs-sub">${t('conjSub')}</div>
    <div class="conj-grid">`;
  Object.entries(GRAMMAR_CONJ).forEach(([verb,data])=>{
    html+=`<div class="conj-card">
      <div class="conj-verb">${verb.charAt(0).toUpperCase()+verb.slice(1)}</div>
      <div class="conj-meaning">— ${currentLang==='fr'?data.fr:data.mg}</div>
      ${Object.entries(data.rows).map(([pro,form])=>`
        <div class="conj-row"><span class="conj-pro">${pro}</span><span class="conj-form">${form}</span></div>`).join('')}
    </div>`;
  });
  html+=`</div></div>`;

  // Useful expressions
  const phrases=[
    {de:"Ich bin... / Ich heiße...", fr:"Je suis... / Je m'appelle...", mg:"Izaho dia... / ... no anarako"},
    {de:"Ich komme aus...", fr:"Je viens de...", mg:"Avy any... aho"},
    {de:"Ich spreche ein bisschen Deutsch.", fr:"Je parle un peu allemand.", mg:"Miteny alemanina kely aho."},
    {de:"Können Sie langsamer sprechen?", fr:"Pouvez-vous parler plus lentement ?", mg:"Afaka miteny mora kokoa ve ianao?"},
    {de:"Wie sagt man ... auf Deutsch?", fr:"Comment dit-on ... en allemand ?", mg:"Ahoana ny filazana ... amin'ny alemanina?"},
    {de:"Das verstehe ich nicht.", fr:"Je ne comprends pas ça.", mg:"Tsy azoko izany."},
    {de:"Können Sie das wiederholen?", fr:"Pouvez-vous répéter ?", mg:"Afaka averenao ve?"},
    {de:"Was bedeutet das?", fr:"Qu'est-ce que ça veut dire ?", mg:"Inona no dikan'izany?"},
    {de:"Ich lerne Deutsch seit ... Monaten.", fr:"J'apprends l'allemand depuis ... mois.", mg:"Mianatra alemanina ... volana aho."},
  ];
  html+=`<div class="grammar-section">
    <div class="gs-title">💡 ${currentLang==='fr'?'Expressions Utiles':'Hevitra Mahasoa'}</div>
    <table class="g-table"><thead><tr><th>🇩🇪 Allemand</th><th>${currentLang==='fr'?'🇫🇷 Français':'🇲🇬 Malagasy'}</th></tr></thead><tbody>
    ${phrases.map(p=>`<tr><td class="de-cell">${p.de}</td><td>${currentLang==='fr'?p.fr:p.mg}</td></tr>`).join('')}
    </tbody></table></div>`;

  html+=`</div>`;
  mc.innerHTML=html;
}

/* ============================================================
   MODE 6 — QUIZ
============================================================ */
function renderReview(){
  const mc=document.getElementById('mainContent');
  if(reviewIndex===0&&!reviewAnswered){
    mc.innerHTML=`
      <div class="review-wrap">
        <div class="stats-grid" style="margin-bottom:1.75rem">
          <div class="stat-card st"><div class="stat-num">${VOCAB.length}</div><div class="stat-label">${currentLang==='fr'?'Mots':'Teny'}</div></div>
          <div class="stat-card sc"><div class="stat-num">${seenWords.size}</div><div class="stat-label">${currentLang==='fr'?'Vus':'Hita'}</div></div>
          <div class="stat-card"><div class="stat-num">6</div><div class="stat-label">${currentLang==='fr'?'Modes':'Karazana'}</div></div>
        </div>
        <div style="text-align:center;padding:1.5rem 0">
          <div style="font-size:3.5rem;margin-bottom:1rem">🎯</div>
          <div style="font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;margin-bottom:.75rem">${t('startQuiz')}</div>
          <p style="color:var(--text-muted);margin-bottom:1.75rem;font-size:.88rem">
            ${currentLang==='fr'?'20 questions aléatoires':'Fanontaniana 20 tsy voatokana'}
          </p>
          <button class="start-btn" onclick="startReview()" style="font-size:.95rem;padding:.85rem 2.25rem">${t('startQuiz')} →</button>
        </div>
      </div>`;
    return;
  }
  if(reviewIndex>=20){renderReviewResults();return;}
  renderReviewQuestion();
}

function startReview(){
  reviewIndex=0;reviewScore=0;reviewTotal=0;reviewAnswered=false;
  reviewQuestions=[...VOCAB].sort(()=>Math.random()-.5).slice(0,20).map(w=>{
    const type=Math.random()>.5?'de2tr':'tr2de';
    const correct=type==='de2tr'?wt(w):w.de;
    const others=VOCAB.filter(v=>v.de!==w.de).sort(()=>Math.random()-.5).slice(0,3)
      .map(v=>type==='de2tr'?wt(v):v.de);
    return{w,type,correct,options:[...others,correct].sort(()=>Math.random()-.5)};
  });
  renderReviewQuestion();
}

function renderReviewQuestion(){
  const mc=document.getElementById('mainContent');
  reviewAnswered=false;
  const q=reviewQuestions[reviewIndex];
  const prompt=q.type==='de2tr'?(q.w.article?q.w.article+' ':'')+q.w.de:wt(q.w);
  const lbl=q.type==='de2tr'?'🇩🇪 → '+(currentLang==='fr'?'🇫🇷':'🇲🇬'):(currentLang==='fr'?'🇫🇷':'🇲🇬')+' → 🇩🇪';
  mc.innerHTML=`
    <div class="review-wrap">
      <div class="quiz-topbar">
        <div class="quiz-counter">${t('question')} ${reviewIndex+1} / 20</div>
        <div class="score-badge">✓ ${reviewScore} / ${reviewIndex}</div>
      </div>
      <div class="quiz-card" style="text-align:center">
        <div class="review-badge">${lbl} • ${t(q.w.cat)}</div>
        <div class="review-question">${prompt}</div>
        <div class="review-sub">${currentLang==='fr'?'Choisissez la bonne traduction':'Safidio ny fandikana mety'}</div>
        <div class="review-options">
          ${q.options.map(opt=>`<button class="review-option" onclick="checkReview('${opt.replace(/'/g,"\\'")}','${q.correct.replace(/'/g,"\\'")}',this)">${opt}</button>`).join('')}
        </div>
      </div>
    </div>`;
}

function checkReview(chosen,correct,btn){
  if(reviewAnswered)return;
  reviewAnswered=true;reviewTotal++;
  const ok=chosen===correct;
  if(ok){reviewScore++;celebrate();}
  document.querySelectorAll('.review-option').forEach(b=>{
    b.disabled=true;
    if(b.textContent.trim()===correct)b.classList.add('correct');
    else if(b===btn&&!ok)b.classList.add('wrong');
  });
  setTimeout(()=>{reviewIndex++;if(reviewIndex>=20)renderReviewResults();else renderReviewQuestion();},1300);
}

function renderReviewResults(){
  const mc=document.getElementById('mainContent');
  const pct=Math.round(reviewScore/20*100);
  const emoji=pct>=80?'🏆':pct>=60?'👍':pct>=40?'📚':'💪';
  mc.innerHTML=`
    <div class="review-wrap">
      <div style="text-align:center;padding:1.5rem 0 2rem">
        <div style="font-size:3.5rem;margin-bottom:.75rem">${emoji}</div>
        <div style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;margin-bottom:.4rem">${t('reviewDone')}</div>
        <div style="font-size:2.8rem;font-family:'Space Mono',monospace;color:var(--accent);font-weight:700;margin-bottom:1.75rem">${pct}%</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card sc"><div class="stat-num">${reviewScore}</div><div class="stat-label">${t('correct')}</div></div>
        <div class="stat-card sw"><div class="stat-num">${20-reviewScore}</div><div class="stat-label">${t('wrong')}</div></div>
        <div class="stat-card st"><div class="stat-num">20</div><div class="stat-label">Total</div></div>
      </div>
      <div style="display:flex;gap:.75rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap">
        <button onclick="startReview()" class="check-btn" style="max-width:200px;min-width:140px">↺ ${currentLang==='fr'?'Recommencer':'Manomboka indray'}</button>
        <button onclick="switchMode('vocab')" class="reveal-btn">📖 ${currentLang==='fr'?'Réviser':'Mamaky indray'}</button>
      </div>
    </div>`;
}

/* ============================================================
   CELEBRATE
============================================================ */
function celebrate(){
  const colors=['var(--accent)','var(--accent2)','var(--accent3)','var(--green)'];
  const wrap=document.createElement('div');wrap.className='celebrate-wrap';
  document.body.appendChild(wrap);
  for(let i=0;i<14;i++){
    const d=document.createElement('div');d.className='cdot';
    d.style.left=Math.random()*window.innerWidth+'px';
    d.style.top=Math.random()*window.innerHeight+'px';
    d.style.background=colors[Math.floor(Math.random()*colors.length)];
    d.style.setProperty('--tx',(Math.random()*220-110)+'px');
    d.style.setProperty('--ty',(Math.random()*-220-60)+'px');
    wrap.appendChild(d);
  }
  setTimeout(()=>wrap.remove(),950);
}
</script>
